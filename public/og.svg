    </text>
  </g>
  <g transform="translate(420 420)">
    <rect x="0" y="0" width="260" height="46" rx="18" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.12)"/>
    <text x="18" y="30" fill="white" fill-opacity="0.72" font-family="JetBrains Mono, ui-monospace" font-size="14">
