  </text>
  <text x="120" y="290" fill="white" fill-opacity="0.70" font-family="Sora, ui-sans-serif, system-ui" font-size="24" font-weight="500">
    AI-native cybersecurity: deception, containment, self-healing runtime, and memory integrity.
  </text>

  <!-- footer chips -->
  <g transform="translate(120 420)">
    <rect x="0" y="0" width="280" height="46" rx="18" fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.12)"/>
    <text x="18" y="30" fill="white" fill-opacity="0.72" font-family="JetBrains Mono, ui-monospace" font-size="14">
