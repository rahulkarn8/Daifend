<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(740 40) rotate(130) scale(980 780)">
      <stop offset="0" stop-color="#29F0FF" stop-opacity="0.18"/>
      <stop offset="0.35" stop-color="#4C7DFF" stop-opacity="0.14"/>
      <stop offset="0.7" stop-color="#B14CFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#050712" stop-opacity="1"/>
