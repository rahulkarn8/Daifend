      <stop offset="0.6" stop-color="#B14CFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#4C7DFF" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#050712"/>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- grid -->
  <g opacity="0.22">
    <path d="M0 110H1200" stroke="white" stroke-opacity="0.15"/>
    <path d="M0 190H1200" stroke="white" stroke-opacity="0.12"/>
    <path d="M0 270H1200" stroke="white" stroke-opacity="0.10"/>
    <path d="M0 350H1200" stroke="white" stroke-opacity="0.10"/>
    <path d="M0 430H1200" stroke="white" stroke-opacity="0.12"/>
    <path d="M0 510H1200" stroke="white" stroke-opacity="0.15"/>
    <path d="M180 0V630" stroke="white" stroke-opacity="0.12"/>
    <path d="M320 0V630" stroke="white" stroke-opacity="0.10"/>
    <path d="M460 0V630" stroke="white" stroke-opacity="0.10"/>
    <path d="M600 0V630" stroke="white" stroke-opacity="0.10"/>
    <path d="M740 0V630" stroke="white" stroke-opacity="0.10"/>
    <path d="M880 0V630" stroke="white" stroke-opacity="0.10"/>
    <path d="M1020 0V630" stroke="white" stroke-opacity="0.12"/>
  </g>

  <!-- frame -->
  <rect x="70" y="70" width="1060" height="490" rx="42" stroke="url(#stroke)" stroke-opacity="0.7"/>
  <rect x="72" y="72" width="1056" height="486" rx="40" stroke="white" stroke-opacity="0.10"/>

  <!-- mark -->
  <g transform="translate(120 120)">
    <rect x="0" y="0" width="72" height="72" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <circle cx="52" cy="22" r="8" fill="#29F0FF" fill-opacity="0.9"/>
    <circle cx="24" cy="54" r="6" fill="#B14CFF" fill-opacity="0.85"/>
    <path d="M20 46c10-20 22-30 38-34" stroke="#29F0FF" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <path d="M26 52c9-15 19-22 32-24" stroke="#B14CFF" stroke-opacity="0.45" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- text -->
  <text x="210" y="152" fill="white" fill-opacity="0.90" font-family="Sora, ui-sans-serif, system-ui" font-size="28" font-weight="600">
    Daifend.AI
  </text>
  <text x="120" y="230" fill="white" fill-opacity="0.94" font-family="Sora, ui-sans-serif, system-ui" font-size="56" font-weight="700">
