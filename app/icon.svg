<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Punch-out for the "minimal cut" on any background -->
    <mask id="cut" maskUnits="userSpaceOnUse" x="0" y="0" width="128" height="128">
      <rect width="128" height="128" fill="white"/>
      <rect x="82" y="60" width="20" height="8" rx="4" fill="black"/>
    </mask>
  </defs>

  <!-- D Shape -->
  <g mask="url(#cut)">
    <path d="M28 20V108" stroke="#F5F7FA" stroke-width="8" stroke-linecap="round"/>
    <path d="M28 20C78 20 98 42 98 64C98 86 78 108 28 108"
        stroke="#F5F7FA"
        stroke-width="8"
        stroke-linecap="round"/>
  </g>

  <!-- Inner semantic node -->
  <rect x="50" y="56" width="12" height="12" rx="2" fill="#9FB4FF"/>
</svg>

